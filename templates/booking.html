{% extends 'base.html' %}

{% block title %}Réserver | Coiff'Connect{% endblock %}

{% block content %}
<div class="booking-container">
    
    <div class="service-summary">
        {% if service.image_url %}
            <img src="{{ service.image_url }}" alt="{{ service.nom }}" class="service-img">
        {% endif %}
        <h2>{{ service.nom }}</h2>
        <p class="text-muted">{{ service.description }}</p>
    </div>

    <div class="booking-form-card">
        <h3>Compléter la réservation</h3>
        
        <form action="/submit-booking" method="POST" id="bookingForm">
            <input type="hidden" name="service_id" value="{{ service.id }}">
            
            <div class="form-group">
                <label>Date du rendez-vous *</label>
                <input type="date" name="selected_date" id="selected_date" class="form-input" required onchange="fetchStylists()">
            </div>

            <div class="form-group">
                <label>Coiffeuse disponible *</label>
                <select name="stylist_id" id="stylist_id" class="form-input" required disabled onchange="fetchTimes()">
                    <option value="" disabled selected>Veuillez d'abord choisir une date</option>
                </select>
            </div>

            <div class="form-group">
                <label>Heure *</label>
                <select name="selected_time" id="selected_time" class="form-input" required disabled>
                    <option value="" disabled selected>Veuillez choisir une coiffeuse</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(197, 160, 89, 0.3); margin: 2rem 0;">

            <div class="form-group">
                <label>Nom complet *</label>
                <input type="text" name="client_nom" class="form-input" required placeholder="Ex: Jean Dupont">
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Téléphone *</label>
                    <input type="tel" name="client_telephone" class="form-input" required placeholder="819-555-0000">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Email *</label>
                    <input type="email" name="client_email" class="form-input" required placeholder="jean@email.com">
                </div>
            </div>

            <div class="form-group mt-3">
                <label>Lieu du rendez-vous *</label>
                <select name="lieu_service" id="lieu_service" class="form-input" required onchange="toggleAddressField()">
                    <option value="studio" selected>En Studio (Chez le coiffeur)</option>
                    <option value="domicile">À Domicile (Je fournis mon adresse)</option>
                </select>
            </div>

            <div class="form-group" id="address_group" style="display: none; background: rgba(197, 160, 89, 0.05); padding: 1rem; border-radius: 8px; border-left: 3px solid var(--gold-primary);">
                <label>Votre adresse complète *</label>
                <input type="text" name="client_adresse" id="client_adresse" class="form-input" placeholder="Ex: 123 Rue Principale, App 4, Val-d'Or">
                <small class="text-muted" style="display: block; margin-top: 0.5rem;">* Des frais de déplacement supplémentaires peuvent s'appliquer.</small>
            </div>

            <button type="submit" class="btn-gold w-100 mt-4" style="font-size: 1.1rem; padding: 1rem;">Réserver maintenant</button>
        </form>
    </div>
</div>

<script>
// 1. Prevent selecting past dates
document.addEventListener('DOMContentLoaded', function() {
    let today = new Date().toISOString().split('T')[0];
    document.getElementById("selected_date").setAttribute('min', today);
});

// 2. Location Toggle Logic
function toggleAddressField() {
    var lieu = document.getElementById("lieu_service").value;
    var addressGroup = document.getElementById("address_group");
    var addressInput = document.getElementById("client_adresse");
    
    if (lieu === "domicile") {
        addressGroup.style.display = "block";
        addressInput.required = true;
    } else {
        addressGroup.style.display = "none";
        addressInput.required = false;
        addressInput.value = ""; // Clear it out if they change their mind
    }
}

// 3. API Logic: Fetch Stylists when Date changes
async function fetchStylists() {
    const serviceId = "{{ service.id }}";
    const dateStr = document.getElementById('selected_date').value;
    const stylistSelect = document.getElementById('stylist_id');
    const timeSelect = document.getElementById('selected_time');
    
    // Reset inputs
    stylistSelect.innerHTML = '<option value="" disabled selected>Chargement...</option>';
    stylistSelect.disabled = true;
    timeSelect.innerHTML = '<option value="" disabled selected>Veuillez choisir une coiffeuse</option>';
    timeSelect.disabled = true;

    if (!dateStr) return;

    try {
        const response = await fetch(`/api/available-stylists/${serviceId}/${dateStr}`);
        const data = await response.json();
        
        stylistSelect.innerHTML = '<option value="" disabled selected>Choisir une coiffeuse...</option>';
        
        // Exact Matches (Available on that exact date)
        if (data.exact_matches.length > 0) {
            data.exact_matches.forEach(s => {
                stylistSelect.innerHTML += `<option value="${s.id}">${s.alias} (${s.prix}$)</option>`;
            });
            stylistSelect.disabled = false;
        } else {
            stylistSelect.innerHTML = '<option value="" disabled selected>Aucune coiffeuse disponible ce jour-là</option>';
            // Optional: You could list the close_matches here as plain text suggestions
        }
    } catch (error) {
        console.error("Error fetching stylists:", error);
        stylistSelect.innerHTML = '<option value="" disabled selected>Erreur système</option>';
    }
}

// 4. API Logic: Fetch Times when Stylist changes
async function fetchTimes() {
    const stylistId = document.getElementById('stylist_id').value;
    const dateStr = document.getElementById('selected_date').value;
    const timeSelect = document.getElementById('selected_time');
    
    timeSelect.innerHTML = '<option value="" disabled selected>Chargement...</option>';
    timeSelect.disabled = true;

    if (!stylistId) return;

    try {
        const response = await fetch(`/api/times/${stylistId}/${dateStr}`);
        const data = await response.json();
        
        timeSelect.innerHTML = '<option value="" disabled selected>Choisir une heure...</option>';
        
        if (data.times.length > 0) {
            data.times.forEach(t => {
                timeSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });
            timeSelect.disabled = false;
        } else {
            timeSelect.innerHTML = '<option value="" disabled selected>Complet pour cette date</option>';
        }
    } catch (error) {
        console.error("Error fetching times:", error);
        timeSelect.innerHTML = '<option value="" disabled selected>Erreur système</option>';
    }
}
</script>

<style>
.booking-container { max-width: 1000px; margin: 3rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 1.5fr; gap: 3rem; }
.service-summary { position: sticky; top: 2rem; }
.service-img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid rgba(197, 160, 89, 0.3); }
.booking-form-card { background: var(--bg-card); padding: 2.5rem; border-radius: 8px; border: 1px solid rgba(197, 160, 89, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.w-100 { width: 100%; }
.mt-3 { margin-top: 1rem; }
.mt-4 { margin-top: 2rem; }
.text-muted { color: #aaa; line-height: 1.6; }
@media (max-width: 768px) {
    .booking-container { grid-template-columns: 1fr; }
    .service-summary { position: relative; top: 0; }
}
</style>
{% endblock %}
