<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coiff'Connect | Rouyn{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-text">COIFF'</span><span class="logo-accent">CONNECT</span>
            </a>
            <ul class="nav-links">
                <li><a href="/">Accueil</a></li>
                <li><a href="/services/coiffures">Services</a></li>
                <li><a href="/politiques-securite">Sécurité</a></li>
            </ul>
        </div>
    </nav>

    <main class="content-wrapper">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 World Connect - Rouyn. Tous droits réservés.</p>
            <p class="footer-tagline">Besoin d'une coiffure sans stress ? Le service vient à vous.</p>
        </div>
    </footer>
</body>
</html>
